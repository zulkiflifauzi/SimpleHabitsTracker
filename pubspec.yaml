name: habit_tracker_app
description: A clean, minimal, fully offline habit tracker.
publish_to: 'none'
version: 2.1.3+7

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4
  flutter_timezone: ^3.0.0

  # Auth
  local_auth: ^2.3.0

  # Persistence
  shared_preferences: ^2.3.0

  # Home screen widget
  home_widget: ^0.6.0

  # Charts (v1.5+)
  fl_chart: ^0.68.0

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0

flutter:
  generate: true
  uses-material-design: true
